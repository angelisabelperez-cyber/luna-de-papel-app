<!DOCTYPE html>       
<html lang="es">      
  <head>             
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">   
    <title>Luna de Papel</title>  
  <body>

  <header>
    <h1>Luna de Papel</h1>
    <p>Calculadora de precios e inventario</p>
  </header>

  <main>

    <section id="inventario">
        <h2>Inventario de materiales</h2>
        
        <table>
            <thead>
                <tr>
                    <th>Material</th>
                    <th>Existencias</th>
                    <th>Costo unitario</th>
                </tr>
            </thead>
            <tbody id="tabla-inventario">
            </tbody>
        </table>
    </section>

    <section id="calculadora">
      <h2>Calculadora de precios</h2>
    </section>

    <section id="productos">
      <h2>Mis productos</h2>
    </section>

  </main>
<script src="app.js"></script>
</body>
</html>
